name: Deploy over SSH

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy from GHCR."
        required: true
        default: latest
        type: string

permissions:
  contents: read
  packages: read

jobs:
  deploy:
    name: Deploy docker-compose production stack
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          test -n "${{ secrets.DEPLOY_HOST }}"
          test -n "${{ secrets.DEPLOY_USER }}"
          test -n "${{ secrets.DEPLOY_SSH_KEY }}"
          test -n "${{ secrets.DEPLOY_PATH }}"
          test -n "${{ secrets.PRODUCTION_ENV }}"

      - name: Prepare SSH key and environment file
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts
          printf '%s\n' "${{ secrets.PRODUCTION_ENV }}" > .env.production

      - name: Copy deployment files
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "mkdir -p '${{ secrets.DEPLOY_PATH }}'"
          scp -i ~/.ssh/deploy_key docker-compose.prod.yml .env.production \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}/"

      - name: Pull and restart stack
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" <<'REMOTE'
          set -eu
          cd '${{ secrets.DEPLOY_PATH }}'
          if docker compose version >/dev/null 2>&1; then
            COMPOSE="docker compose"
          else
            COMPOSE="docker-compose"
          fi
          if [ -n '${{ secrets.GHCR_TOKEN }}' ]; then
            printf '%s\n' '${{ secrets.GHCR_TOKEN }}' | docker login ghcr.io \
              -u '${{ secrets.GHCR_USERNAME }}' --password-stdin
          fi
          export HWPTOPDF_IMAGE_TAG='${{ inputs.image_tag }}'
          $COMPOSE --env-file .env.production -f docker-compose.prod.yml pull
          $COMPOSE --env-file .env.production -f docker-compose.prod.yml up -d --remove-orphans
          $COMPOSE --env-file .env.production -f docker-compose.prod.yml ps
          REMOTE
