name: Docker Build

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "apps/api/Dockerfile"
      - "apps/web/Dockerfile"
      - "apps/web/nginx.conf"
      - "hwp-sidecar/**"
      - "docker-compose.yml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "packages/shared/**"
      - ".github/workflows/docker-build.yml"

permissions:
  contents: read

jobs:
  docker-build:
    name: Build ${{ matrix.name }} image
    runs-on: ubuntu-latest
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            context: .
            dockerfile: apps/api/Dockerfile
          - name: web
            context: .
            dockerfile: apps/web/Dockerfile
          - name: hwp-sidecar
            context: hwp-sidecar
            dockerfile: hwp-sidecar/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Build image
        run: docker build --file "${{ matrix.dockerfile }}" --tag "hwptopdf-${{ matrix.name }}:ci" "${{ matrix.context }}"
