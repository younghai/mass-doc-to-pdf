services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?set MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    ports:
      - "${MINIO_API_PORT:-127.0.0.1:9000}:9000"
      - "${MINIO_CONSOLE_PORT:-127.0.0.1:9001}:9001"

  createbucket:
    image: minio/mc:latest
    restart: "no"
    depends_on:
      - minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?set MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD}
      S3_BUCKET: ${S3_BUCKET:-hwptopdf}
    entrypoint: >
      /bin/sh -c "until mc alias set m http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD; do sleep 1; done;
      mc mb -p m/$$S3_BUCKET || true;"

  gotenberg:
    image: gotenberg/gotenberg:8
    command: ["gotenberg", "--api-timeout=120s"]
    restart: unless-stopped

  hwp-sidecar:
    image: ${HWPTOPDF_IMAGE_PREFIX:?set HWPTOPDF_IMAGE_PREFIX}-hwp-sidecar:${HWPTOPDF_IMAGE_TAG:-latest}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health', timeout=3)\""]
      interval: 30s
      timeout: 5s
      retries: 5

  api:
    image: ${HWPTOPDF_IMAGE_PREFIX:?set HWPTOPDF_IMAGE_PREFIX}-api:${HWPTOPDF_IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      DATABASE_URL: file:/data/app.db
      GOTENBERG_URL: http://gotenberg:3000
      HWP_SIDECAR_URL: http://hwp-sidecar:8080
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: ${S3_BUCKET:-hwptopdf}
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:?set MINIO_ROOT_USER}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD}
      AUTH_SECRET: ${AUTH_SECRET:?set AUTH_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:?set GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:?set GOOGLE_CLIENT_SECRET}
      DEV_AUTH: ${DEV_AUTH:-0}
      WEB_ORIGIN: ${WEB_ORIGIN:?set WEB_ORIGIN}
      PORT: "8000"
      HANCOM_BASE_URL: ${HANCOM_BASE_URL:-}
      HANCOM_API_KEY: ${HANCOM_API_KEY:-}
      ASPOSE_BASE_URL: ${ASPOSE_BASE_URL:-}
      ASPOSE_CLIENT_ID: ${ASPOSE_CLIENT_ID:-}
      ASPOSE_CLIENT_SECRET: ${ASPOSE_CLIENT_SECRET:-}
      USE_QUEUE: "1"
    volumes:
      - api-data:/data
    depends_on:
      - gotenberg
      - hwp-sidecar
      - minio
      - createbucket
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:8000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 5

  worker:
    image: ${HWPTOPDF_IMAGE_PREFIX:?set HWPTOPDF_IMAGE_PREFIX}-api:${HWPTOPDF_IMAGE_TAG:-latest}
    command: ["node", "dist/queue/worker-main.js"]
    restart: unless-stopped
    environment:
      DATABASE_URL: file:/data/app.db
      GOTENBERG_URL: http://gotenberg:3000
      HWP_SIDECAR_URL: http://hwp-sidecar:8080
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: ${S3_BUCKET:-hwptopdf}
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:?set MINIO_ROOT_USER}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD}
      AUTH_SECRET: ${AUTH_SECRET:?set AUTH_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:?set GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:?set GOOGLE_CLIENT_SECRET}
      DEV_AUTH: ${DEV_AUTH:-0}
      WEB_ORIGIN: ${WEB_ORIGIN:?set WEB_ORIGIN}
      HANCOM_BASE_URL: ${HANCOM_BASE_URL:-}
      HANCOM_API_KEY: ${HANCOM_API_KEY:-}
      ASPOSE_BASE_URL: ${ASPOSE_BASE_URL:-}
      ASPOSE_CLIENT_ID: ${ASPOSE_CLIENT_ID:-}
      ASPOSE_CLIENT_SECRET: ${ASPOSE_CLIENT_SECRET:-}
      USE_QUEUE: "1"
      WORKER_IDLE_POLL_MS: ${WORKER_IDLE_POLL_MS:-1000}
      WORKER_MAX_ATTEMPTS: ${WORKER_MAX_ATTEMPTS:-3}
      WORKER_VISIBILITY_TIMEOUT_MS: ${WORKER_VISIBILITY_TIMEOUT_MS:-900000}
    volumes:
      - api-data:/data
    depends_on:
      api:
        condition: service_healthy

  web:
    image: ${HWPTOPDF_IMAGE_PREFIX:?set HWPTOPDF_IMAGE_PREFIX}-web:${HWPTOPDF_IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8081}:80"
    depends_on:
      - api
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  minio-data: {}
  api-data: {}
